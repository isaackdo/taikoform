// Tic Tac Toe
function TicTacToe({T,onScore,playerName}){
  const [board,setBoard]=useState(Array(9).fill(null));
  const [isX,setIsX]=useState(true);
  const [status,setStatus]=useState("");
  const [wins,setWins]=useState(0);
  const winLines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  const checkWin=b=>{for(let[a,c,d]of winLines)if(b[a]&&b[a]===b[c]&&b[a]===b[d])return b[a];return b.every(Boolean)?"D":null;};
  const click=i=>{
    if(board[i]||status)return;
    const nb=[...board];nb[i]="X";
    const r=checkWin(nb);setBoard(nb);setIsX(false);
    if(r==="X"){setStatus("win");setWins(w=>w+1);onScore(15);return;}
    if(r==="D"){setStatus("draw");return;}
    setTimeout(()=>{
      const empty=nb.map((v,idx)=>v?null:idx).filter(v=>v!==null);
      if(!empty.length)return;
      const nb2=[...nb];
      // simple AI: win if can, block if can, else random
      let best=null;
      for(let idx of empty){const t=[...nb2];t[idx]="O";if(checkWin(t)==="O"){best=idx;break;}}
      if(best===null)for(let idx of empty){const t=[...nb2];t[idx]="X";if(checkWin(t)==="X"){best=idx;break;}}
      if(best===null)best=rnd(empty);
      nb2[best]="O";
      const r2=checkWin(nb2);setBoard(nb2);setIsX(true);
      if(r2==="O")setStatus("lose");
      else if(r2==="D")setStatus("draw");
    },400);
  };
  const reset=()=>{setBoard(Array(9).fill(null));setIsX(true);setStatus("");};
  const winLine=winLines.find(([a,b,c])=>board[a]&&board[a]===board[b]&&board[a]===board[c]);
  return(
    <div style={{textAlign:"center"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,padding:"8px 12px",background:T.surface,borderRadius:10,border:`1px solid ${T.a}10`}}>

// Hangman
const PALAVRAS=["AMIZADE","COLÉGIO","INTERVALO","PROFESSOR","ESTUDANTE","CLUBE","ESPORTE","ANIME","MÚSICA","AVENTURA","DESAFIO","PROGRAMAÇÃO","FOTOGRAFIA","LITERATURA","BASQUETE","FUTEBOL","CRIATIVIDADE","MARINGÁ","DESCOBERTA","FELICIDADE","CONHECIMENTO","LIDERANÇA"];
function Hangman({T,onScore}){
  const [word,setWord]=useState(()=>rnd(PALAVRAS));
  const [guessed,setGuessed]=useState([]);
  const [errors,setErrors]=useState(0);
  const max=6;
  const display=word.split("").map(l=>guessed.includes(l)?l:"_");
  const won=display.every(l=>l!=="_");
  const lost=errors>=max;
  const guess=l=>{
    if(guessed.includes(l)||won||lost)return;
    const ng=[...guessed,l];setGuessed(ng);
    if(!word.includes(l)){setErrors(e=>e+1);}
    else if(word.split("").map(c=>ng.includes(c)?c:"_").every(c=>c!=="_")){onScore(20);}
  };
  const reset=()=>{setWord(rnd(PALAVRAS));setGuessed([]);setErrors(0);};
  const limbParts=[
    "M20,78 L80,78","M50,78 L50,15","M50,15 L72,15","M72,15 L72,30",
    "M72,30 C72,38 66,42 66,42 C72,42 78,38 72,30",
    "M72,46 L72,62","M72,52 L63,46 M72,52 L81,46",
    "M72,62 L63,73 M72,62 L81,73",

  return(
    <div style={{textAlign:"center"}}>
      <div style={{display:"flex",justifyContent:"center",gap:16,marginBottom:10,padding:"8px",background:T.surface,borderRadius:10,border:`1px solid ${T.a}10`}}>
        <div style={{fontSize:10,color:T.sub}}>Erros: <span style={{color:"#F87171",fontWeight:800}}>{errors}/{max}</span></div>
        <div style={{fontSize:10,color:T.sub}}>Letras: <span style={{color:T.a,fontWeight:800}}>{guessed.length}</span></div>
      </div>
      <svg width={110} height={90} style={{display:"block",margin:"0 auto 10px"}}>
        {limbParts.slice(0,Math.min(errors+2,limbParts.length)).map((d,i)=>(
          <path key={i} d={d} stroke={i<2?"#555":i===2||i===3?T.sub+"80":T.a} strokeWidth={i<4?2.5:2} strokeLinecap="round" fill="none" style={{animation:"fadeIn .2s both"}}/>
        ))}
      </svg>
      <div style={{fontSize:22,letterSpacing:10,fontWeight:900,color:T.text,marginBottom:8,letterSpacing:8,fontFamily:"monospace"}}>{display.join(" ")}</div>
      {(won||lost)&&(
        <div style={{fontSize:13,color:won?T.a:"#F87171",fontWeight:700,marginBottom:10,animation:"gameWin .4s both"}}>
          {won?"🎉 Acertou! +20 pts":"💀 Era: "+word}
        </div>
      )}
      <div style={{display:"flex",flexWrap:"wrap",gap:3,justifyContent:"center",maxWidth:285,margin:"0 auto 10px"}}>
        {"ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").map(l=>{
          const used=guessed.includes(l);const hit=word.includes(l)&&used;const miss=!word.includes(l)&&used;
          return(
            <div key={l} onClick={()=>guess(l)} style={{width:26,height:26,borderRadius:7,background:hit?`${T.a}28`:miss?"#F8717118":T.surface,border:`1.5px solid ${hit?T.a:miss?"#F8717160":T.a+"18"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,cursor:used||won||lost?"default":"pointer",color:hit?T.a:miss?"#F87171":T.text,opacity:used?.55:1,transition:"all .12s"}}>
              {l}
            </div>
          );
        })}
      </div>
      {(won||lost)&&<button className="btn-main" onClick={reset} style={bsm(T)}>Nova palavra</button>}
    </div>
  );
}

// Snake
const SNAKE_COLS=14,SNAKE_ROWS=20;
function Snake({T,onScore}){
  const [snake,setSnake]=useState([[7,10],[7,11],[7,12]]);
  const [food,setFood]=useState([3,5]);
  const [dir,setDir]=useState([0,-1]);
  const [on,setOn]=useState(false);
  const [over,setOver]=useState(false);
  const [score,setScore]=useState(0);
  const dirRef=useRef([0,-1]);const snakeRef=useRef([[7,10],[7,11],[7,12]]);const foodRef=useRef([3,5]);
  const newFood=useCallback(()=>{let f;do{f=[Math.floor(Math.random()*SNAKE_COLS),Math.floor(Math.random()*SNAKE_ROWS)];}while(snakeRef.current.some(([x,y])=>x===f[0]&&y===f[1]));return f;},[]);
  const step=useCallback(()=>{
    const s=snakeRef.current;const[dx,dy]=dirRef.current;const[hx,hy]=s[0];const nx=hx+dx;const ny=hy+dy;
    if(nx<0||nx>=SNAKE_COLS||ny<0||ny>=SNAKE_ROWS||s.some(([x,y])=>x===nx&&y===ny)){setOn(false);setOver(true);return;}
    const ate=(nx===foodRef.current[0]&&ny===foodRef.current[1]);
    const ns=ate?[[nx,ny],...s]:[[nx,ny],...s.slice(0,-1)];
    snakeRef.current=ns;setSnake([...ns]);
    if(ate){const nf=newFood();foodRef.current=nf;setFood(nf);setScore(sc=>{const ns2=sc+10;onScore(10);return ns2;});}
  },[newFood,onScore]);
  useEffect(()=>{if(!on)return;const t=setInterval(step,130);return()=>clearInterval(t);},[on,step]);
  const setDir2=d=>{
    const[dx,dy]=d;const[cdx,cdy]=dirRef.current;
    if(dx===-cdx&&dy===-cdy)return;
    dirRef.current=d;setDir(d);
  };
  const start=()=>{const s=[[7,10],[7,11],[7,12]];snakeRef.current=s;setSnake(s);dirRef.current=[0,-1];setDir([0,-1]);const f=newFood();foodRef.current=f;setFood(f);setScore(0);setOver(false);setOn(true);};
  const cSize=Math.floor(Math.min(290,window.innerWidth-60)/SNAKE_COLS);
  return(
    <div style={{textAlign:"center"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,padding:"8px 12px",background:T.surface,borderRadius:10,border:`1px solid ${T.a}10`}}>
        <div style={{fontSize:11,color:T.sub}}>Pts: <span style={{color:T.a,fontWeight:800}}>{score}</span></div>
        <div style={{fontSize:11,color:T.text,fontWeight:700}}>{over?"GAME OVER 💀":on?"🐍 Jogando":"Pronto!"}</div>
        <div style={{fontSize:11,color:T.sub}}>+10/maçã</div>
      </div>
      <div style={{display:"inline-block",border:`2px solid ${T.a}28`,borderRadius:10,overflow:"hidden",marginBottom:12,boxShadow:`0 0 24px ${T.a}18`}}>
        {Array(SNAKE_ROWS).fill(0).map((_,y)=>(
          <div key={y} style={{display:"flex"}}>
            {Array(SNAKE_COLS).fill(0).map((_2,x)=>{
              const isHead=snake[0]?.[0]===x&&snake[0]?.[1]===y;
              const isBody=!isHead&&snake.some(([sx,sy])=>sx===x&&sy===y);
              const isFood=food[0]===x&&food[1]===y;
              return(
                <div key={x} style={{width:cSize,height:cSize,background:isHead?T.a:isBody?T.a+"70":isFood?"#F87171":T.bg,borderRadius:isHead?4:isBody?2:0,transition:isHead?"none":"background .08s",boxShadow:isHead?`0 0 8px ${T.a}`:isFood?"0 0 6px #F87171":undefined}}/>
              );
            })}
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:8}}>
        {!on&&<button className="btn-main" onClick={start} style={bsm(T)}>{over?"Jogar de novo":"▶ Iniciar"}</button>}
        {on&&<>
          <button onClick={()=>setDir2([0,-1])} style={{...bsm(T),fontSize:16,padding:"6px 14px"}}>↑</button>
          <button onClick={()=>setDir2([-1,0])} style={{...bsm(T),fontSize:16,padding:"6px 14px"}}>←</button>
          <button onClick={()=>setDir2([0,1])} style={{...bsm(T),fontSize:16,padding:"6px 14px"}}>↓</button>
          <button onClick={()=>setDir2([1,0])} style={{...bsm(T),fontSize:16,padding:"6px 14px"}}>→</button>
        </>}
      </div>
    </div>
  );
}

// Memory Game
const EMOJIS_PAIRS=["🦊","🐺","🐸","🦁","🐉","⚡","🌙","🎮","🔥","🌊","🎵","🦋"];
function MemoryGame({T,onScore}){
  const [cards,setCards]=useState(()=>{const c=[...EMOJIS_PAIRS,...EMOJIS_PAIRS].map((e,i)=>({id:i,emoji:e,flipped:false,matched:false}));for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]];}return c;});
  const [selected,setSelected]=useState([]);
  const [moves,setMoves]=useState(0);
  const [won,setWon]=useState(false);
  const [lock,setLock]=useState(false);
  const flip=i=>{
    if(lock||cards[i].flipped||cards[i].matched)return;
    const nc=[...cards];nc[i]={...nc[i],flipped:true};
    const ns=[...selected,i];setSelected(ns);setCards(nc);
    if(ns.length===2){
      setMoves(m=>m+1);setLock(true);
      const[a,b]=ns;
      if(nc[a].emoji===nc[b].emoji){
        setTimeout(()=>{setCards(c=>{const x=[...c];x[a]={...x[a],matched:true};x[b]={...x[b],matched:true};const allDone=x.every(c=>c.matched);if(allDone){setWon(true);onScore(30);}return x;});setSelected([]);setLock(false);},500);
      }else{
        setTimeout(()=>{setCards(c=>{const x=[...c];x[a]={...x[a],flipped:false};x[b]={...x[b],flipped:false};return x;});setSelected([]);setLock(false);},900);
      }
    }
  };
  const reset=()=>{const c=[...EMOJIS_PAIRS,...EMOJIS_PAIRS].map((e,i)=>({id:i,emoji:e,flipped:false,matched:false}));for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]];}setCards(c);setSelected([]);setMoves(0);setWon(false);setLock(false);};
  return(
    <div style={{textAlign:"center"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,padding:"8px 12px",background:T.surface,borderRadius:10,border:`1px solid ${T.a}10`}}>
        <div style={{fontSize:11,color:T.sub}}>Movimentos: <span style={{color:T.a,fontWeight:800}}>{moves}</span></div>
        <div style={{fontSize:11,color:T.text,fontWeight:700}}>{won?"✅ Completo!":"🧠 Memória"}</div>
        <div style={{fontSize:11,color:T.sub}}>+30 pts</div>
      </div>
      {won&&<div style={{fontSize:13,color:T.a,fontWeight:800,marginBottom:10,animation:"gameWin .4s both"}}>🎉 Parabéns! +30 pts em {moves} movimentos!</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:5,maxWidth:300,margin:"0 auto 14px"}}>
        {cards.map((c,i)=>(
          <div key={c.id} onClick={()=>flip(i)} className="card" style={{width:42,height:42,borderRadius:9,background:c.flipped||c.matched?T.surface:T.card,border:`2px solid ${c.matched?T.a:c.flipped?T.b:T.a+"18"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:c.flipped||c.matched?20:0,cursor:"pointer",boxShadow:c.matched?`0 0 10px ${T.a}40`:"none",transition:"all .2s",opacity:c.matched?.5:1}}>
            {(c.flipped||c.matched)?c.emoji:""}
          </div>
        ))}
      </div>
      <button className="btn-main" onClick={reset} style={bsm(T)}>{won?"Jogar novamente":"🔀 Embaralhar"}</button>
    </div>
  );
}

// Tetris
const TET_PIECES={I:[[1,1,1,1]],O:[[1,1],[1,1]],T:[[0,1,0],[1,1,1]],S:[[0,1,1],[1,1,0]],Z:[[1,1,0],[0,1,1]],L:[[1,0],[1,0],[1,1]],J:[[0,1],[0,1],[1,1]]};
const TET_COLORS=["#EF4444","#F97316","#EAB308","#22C55E","#3B82F6","#8B5CF6","#EC4899"];
const TW=10,TH=18;
function Tetris({T,onScore}){
  const [grid,setGrid]=useState(()=>Array(TH).fill(null).map(()=>Array(TW).fill(0)));
  const [cur,setCur]=useState(null);const [next,setNext]=useState(null);const [sc,setSc]=useState(0);const [on,setOn]=useState(false);const [ov,setOv]=useState(false);const [level,setLevel]=useState(1);
  const gRef=useRef(grid);const cRef=useRef(cur);const scRef=useRef(0);
  gRef.current=grid;cRef.current=cur;
  const mkPiece=useCallback(()=>{const ks=Object.keys(TET_PIECES);const k=rnd(ks);const sh=TET_PIECES[k];return{shape:sh,col:Math.floor((TW-sh[0].length)/2),row:0,color:rnd(TET_COLORS)};},[]);
  const fits=(g,p,dr=0,dc=0)=>p.shape.every((row,ri)=>row.every((v,ci)=>{if(!v)return true;const nr=p.row+ri+dr,nc=p.col+ci+dc;return nr>=0&&nr<TH&&nc>=0&&nc<TW&&!g[nr][nc];}));
  const merge=(g,p)=>{const ng=g.map(r=>[...r]);p.shape.forEach((row,ri)=>row.forEach((v,ci)=>{if(v)ng[p.row+ri][p.col+ci]=p.color;}));return ng;};
  const clear=g=>{const kept=g.filter(row=>row.some(c=>!c));const cl=TH-kept.length;return{grid:[...Array(cl).fill(null).map(()=>Array(TW).fill(0)),...kept],cleared:cl};};
  const drop=useCallback(()=>{
    const p=cRef.current;const g=gRef.current;if(!p)return;
    if(fits(g,p,1,0)){setCur(c=>({...c,row:c.row+1}));}else{
      const mg=merge(g,p);const{grid:ng,cleared}=clear(mg);setGrid(ng);
      if(cleared){setSc(s=>{const ns=s+cleared*100*(Math.floor(s/500)+1);scRef.current=ns;onScore(cleared*12);setLevel(Math.floor(ns/500)+1);return ns;});}
      const np2=mkPiece();if(!fits(ng,np2)){setOv(true);setOn(false);setCur(null);}
      else{setCur(np2);setNext(mkPiece());}
    }
  },[mkPiece,onScore]);
  const speed=Math.max(120,480-((level-1)*60));
  useEffect(()=>{if(!on)return;const t=setInterval(drop,speed);return()=>clearInterval(t);},[on,drop,speed]);
  const mv=dc=>{if(cur&&fits(grid,cur,0,dc))setCur(c=>({...c,col:c.col+dc}));};
  const rot=()=>{if(!cur)return;const r=cur.shape[0].map((_,i)=>cur.shape.map(row=>row[i]).reverse());const np2={...cur,shape:r};if(fits(grid,np2))setCur(np2);};
  const hardDrop=()=>{if(!cur)return;let dr=0;while(fits(grid,cur,dr+1,0))dr++;setCur(c=>({...c,row:c.row+dr}));setTimeout(drop,50);};
  const start=()=>{const p=mkPiece();setGrid(Array(TH).fill(null).map(()=>Array(TW).fill(0)));setCur(p);setNext(mkPiece());setSc(0);scRef.current=0;setLevel(1);setOn(true);setOv(false);};
  const disp=grid.map(r=>[...r]);
  if(cur)cur.shape.forEach((row,ri)=>row.forEach((v,ci)=>{if(v&&cur.row+ri<TH)disp[cur.row+ri][cur.col+ci]=cur.color;}));
  const cSize=Math.floor(Math.min(250,window.innerWidth-100)/TW);
  return(
    <div style={{textAlign:"center"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,padding:"8px 12px",background:T.surface,borderRadius:10,border:`1px solid ${T.a}10`}}>
        <div><div style={{fontSize:9,color:T.sub}}>PONTOS</div><div style={{fontSize:14,fontWeight:900,color:T.a}}>{sc}</div></div>

// Dino Runner (upgraded)
function Dino({T,onScore}){
  const [dinoY,setDinoY]=useState(0);const [obsX,setObsX]=useState(320);const [sc,setSc]=useState(0);const [on,setOn]=useState(false);const [ov,setOv]=useState(false);const [speed,setSpeed]=useState(4);const [obsH,setObsH]=useState(28);
  const jumping=useRef(false);const oxRef=useRef(320);const scRef=useRef(0);const dyRef=useRef(0);const spRef=useRef(4);
  const jump=useCallback(()=>{
    if(jumping.current||!on)return;jumping.current=true;
    let h=0;const up=setInterval(()=>{h+=9;dyRef.current=h;setDinoY(h);if(h>=80)clearInterval(up);},16);
    setTimeout(()=>{const dn=setInterval(()=>{h-=6;dyRef.current=Math.max(0,h);setDinoY(Math.max(0,h));if(h<=0){clearInterval(dn);jumping.current=false;}},16);},400);
  },[on]);
  useEffect(()=>{
    if(!on)return;
    const lp=setInterval(()=>{
      const sp=spRef.current;oxRef.current-=sp;
      if(oxRef.current<-28){oxRef.current=320+Math.random()*80;scRef.current++;setSc(s=>s+1);spRef.current=Math.min(10,4+scRef.current*0.05);setSpeed(spRef.current);if(scRef.current%6===0)onScore(8);}
      setObsX(oxRef.current);
      const oH=obsH;
      if(oxRef.current<70&&oxRef.current>24&&oH-dyRef.current+4>-8&&dyRef.current<oH+8){clearInterval(lp);setOn(false);setOv(true);}
    },24);
    return()=>clearInterval(lp);
  },[on,onScore,obsH]);
  useEffect(()=>{const h=e=>{if(e.key===" "||e.key==="ArrowUp")jump();};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[jump]);
  const start=()=>{setOn(true);setOv(false);setSc(0);scRef.current=0;oxRef.current=320;setObsX(320);dyRef.current=0;setDinoY(0);jumping.current=false;spRef.current=4;setSpeed(4);setObsH(20+Math.floor(Math.random()*20));};
  return(
    <div style={{textAlign:"center"}} onClick={jump}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,padding:"8px 12px",background:T.surface,borderRadius:10,border:`1px solid ${T.a}10`}}>
        <div style={{fontSize:11,color:T.sub}}>Pts: <span style={{color:T.a,fontWeight:800}}>{sc}</span></div>
        <div style={{fontSize:11,color:T.text,fontWeight:700}}>{ov?"GAME OVER 💀":on?"Toque/Espaço para pular":"Pronto!"}</div>
        <div style={{fontSize:11,color:T.sub}}>Vel: {speed.toFixed(1)}</div>
      </div>
      <div style={{position:"relative",width:"100%",maxWidth:320,height:88,background:T.surface,borderRadius:12,border:`1px solid ${T.a}18`,margin:"0 auto 12px",overflow:"hidden",cursor:"pointer",boxShadow:`0 0 20px ${T.a}12`}}>
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${T.a}40,transparent)`}}/>
        <div style={{position:"absolute",bottom:6+dinoY,left:30,fontSize:26,transition:"bottom .016s linear"}}>🦕</div>
        {on&&<div style={{position:"absolute",bottom:6,left:obsX,fontSize:obsH>30?24:20,lineHeight:1}}>🌵</div>}
        {[...Array(8)].map((_,i)=><div key={i} style={{position:"absolute",bottom:2,left:`${5+i*13}%`,width:20,height:2,background:T.a+"18",borderRadius:1}}/>)}
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"center"}}>
        {!on&&!ov&&<button className="btn-main" onClick={e=>{e.stopPropagation();start();}} style={bsm(T)}>▶ Iniciar</button>}
        {on&&<button onClick={e=>{e.stopPropagation();jump();}} style={bsm(T)}>⬆ Pular</button>}
        {ov&&<button className="btn-main" onClick={e=>{e.stopPropagation();start();}} style={bsm(T)}>Jogar de novo</button>}
      </div>
    </div>
  );
}

    const all=MSG_TREE.flatMap(n=>[n,...(n.r||[]),...((n.r||[]).flatMap(r=>r.r||[]))]);
    const par=all.find(n=>n.r?.some(r=>r.id===step));
    if(par){const rn=par.r.find(r=>r.id===step);if(rn?.r)opts=rn.r.map(r=>({id:r.id,t:r.t,next:null,meet:MEET_IDS.includes(r.id)}));}
    if(!opts.length)opts=MSG_TREE.slice(0,4).map(m=>({id:m.id,t:m.t,next:m.r?.[0]?.id,meet:MEET_IDS.includes(m.id)}));
  }
  const av2=getAv(contact.av);
  const comClubs=ALL_CLUBS.filter(c=>contact.c.includes(c.id)&&user.clubs.includes(c.id));
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",paddingTop:12,position:"relative"}}>
      <ChatBG id={bg} T={T}/>
      <div style={{position:"relative",zIndex:1,display:"flex",flexDirection:"column",height:"100%",padding:"0 0 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,paddingBottom:10,borderBottom:`1px solid ${T.a}0E`,marginBottom:8,flexShrink:0}}>
          <button onClick={onBack} style={{background:`${T.a}12`,border:"none",borderRadius:10,color:T.text,fontSize:16,padding:"5px 11px",cursor:"pointer",fontWeight:700}}>←</button>
          <AvatarBubble av={av2} size={36} T={T}/>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:800,color:T.text}}>{contact.n}</div>
            <div style={{fontSize:9,color:T.sub}}>{contact.y} · {contact.school}</div>
          </div>
          <button onClick={()=>setShowBg(s=>!s)} style={{background:`${T.a}0E`,border:"none",borderRadius:8,color:T.a,fontSize:9,fontWeight:700,padding:"4px 8px",cursor:"pointer"}}>🎨</button>
        </div>

        {showBg&&(
          <div className="si" style={{background:T.surface,border:`1px solid ${T.a}10`,borderRadius:12,padding:"10px",marginBottom:8,flexShrink:0}}>
            <div style={{fontSize:9,fontWeight:800,color:T.sub,textTransform:"uppercase",marginBottom:6}}>Fundo do chat</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {CHAT_BGS.map(b=><button key={b.id} onClick={()=>{setBg(b.id);setShowBg(false);}} style={{border:`2px solid ${bg===b.id?T.a:T.a+"18"}`,borderRadius:8,padding:"5px 10px",background:bg===b.id?`${T.a}14`:"transparent",color:bg===b.id?T.a:T.sub,fontSize:10,fontWeight:700,cursor:"pointer"}}>{b.l}</button>)}
            </div>
          </div>
        )}

        {comClubs.length>0&&(
          <div style={{background:`${T.a}08`,border:`1px solid ${T.a}18`,borderRadius:10,padding:"8px 10px",marginBottom:8,flexShrink:0,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:9,color:T.sub,fontWeight:700}}>Em comum:</span>
            {comClubs.slice(0,4).map(c=><span key={c.id} style={{fontSize:9,color:T.a,background:`${T.a}10`,borderRadius:8,padding:"2px 7px",fontWeight:600}}>{c.i} {c.n}</span>)}
          </div>
        )}

        <div style={{background:`${T.b}08`,border:`1px solid ${T.b}14`,borderRadius:10,padding:"6px 10px",marginBottom:8,fontSize:9,color:T.text+"AA",flexShrink:0,display:"flex",gap:6,alignItems:"center"}}>
          🛡️ <span>Mensagens seguras e pré-definidas · Encontro presencial no colégio</span>
        </div>

        <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:6,paddingBottom:8,position:"relative",zIndex:1}}>
          {msgs.map((m,i)=>{

              <button key={o.id} onClick={()=>onSend(o.t+(emj?" "+emj:""),o.next,o.meet)} style={{background:T.card,border:`1.5px solid ${o.meet?T.a:T.a+"10"}`,borderLeft:o.meet?`3px solid ${T.a}`:`1.5px solid ${T.a+"10"}`,borderRadius:10,color:T.text,fontSize:11,fontWeight:500,padding:"8px 10px",cursor:"pointer",textAlign:"left",lineHeight:1.45,transition:"all .15s",animation:`slideR .18s ${i*.04}s both`}}>

}

// ── CLUBS ─────────────────────────────────────────────────────
function ClubsScr({T,user,onJoin}){
  const [joined,setJoined]=useState(user.clubs);const [search,setSearch]=useState("");const [activeGroup,setActiveGroup]=useState(null);
  const tog=id=>{const nx=joined.includes(id)?joined.filter(j=>j!==id):[...joined,id];setJoined(nx);onJoin(nx);};
  const filtered=CLUB_GROUPS.map(g=>({...g,c:g.c.filter(c=>c.n.toLowerCase().includes(search.toLowerCase()))})).filter(g=>!search||g.c.length>0);
  return(
    <div className="fu" style={{paddingBottom:90}}>
      <TopBar T={T} title="🎯 Clubes" right={<div style={{background:`${T.a}14`,borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:700,color:T.a}}>{joined.length} ativos</div>}/>
      <input style={{...IS(T),marginBottom:10,fontSize:12}} placeholder="🔍 Buscar clube…" value={search} onChange={e=>setSearch(e.target.value)}/>
      {joined.length>0&&!search&&(
        <div style={{marginBottom:16}}>
          <SecTitle T={T}>✅ Seus clubes ({joined.length})</SecTitle>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {ALL_CLUBS.filter(c=>joined.includes(c.id)).map(c=>(
              <span key={c.id} onClick={()=>tog(c.id)} className="card" style={{background:`${T.a}14`,border:`1.5px solid ${T.a}28`,borderRadius:20,padding:"5px 10px",fontSize:10,color:T.a,fontWeight:700,cursor:"pointer",transition:"all .15s"}}>
                {c.i} {c.n} ✕
              </span>
            ))}
          </div>
        </div>
      )}
      {filtered.map((g,gi)=>(
        <div key={g.g} style={{marginBottom:14,animation:`fadeUp .25s ${gi*.04}s both`}}>
          <div onClick={()=>setActiveGroup(activeGroup===g.g?null:g.g)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",background:T.card,border:`1px solid ${T.a}0E`,borderRadius:12,marginBottom:6,cursor:"pointer"}}>
            <div style={{fontSize:11,fontWeight:800,color:T.text}}>{g.g}</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              {g.c.filter(c=>joined.includes(c.id)).length>0&&<div style={{fontSize:9,color:T.a,fontWeight:700,background:`${T.a}14`,borderRadius:10,padding:"2px 6px"}}>{g.c.filter(c=>joined.includes(c.id)).length}</div>}
              <div style={{color:T.sub,fontSize:12}}>{activeGroup===g.g?"▲":"▼"}</div>
            </div>
          </div>
          {(activeGroup===g.g||search)&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,animation:"fadeIn .2s both"}}>
              {g.c.map(c=>{const act=joined.includes(c.id);return(
                <div key={c.id} className="card" onClick={()=>tog(c.id)} style={{background:act?`${T.a}10`:T.card,border:`1.5px solid ${act?T.a:T.a+"10"}`,borderRadius:12,padding:"11px 10px",position:"relative",transition:"all .18s"}}>
                  {act&&<div style={{position:"absolute",top:5,right:5,width:15,height:15,borderRadius:"50%",background:T.a,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",fontWeight:800}}>✓</div>}
                  <div style={{fontSize:20,marginBottom:4}}>{c.i}</div>
                  <div style={{fontSize:11,fontWeight:700,color:T.text,lineHeight:1.2,marginBottom:2}}>{c.n}</div>
                  <div style={{fontSize:9,color:act?T.a:T.sub,fontWeight:act?700:400}}>{act?"Membro ✓":"+ Entrar"}</div>
                </div>
              );})}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────
function App(){
  const [splash,setSplash]=useState(true);
  const [onboarded,setOnboarded]=useState(false);
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState("home");
  const [tid,setTid]=useState("aurora");
  const [fid,setFid]=useState("system");
  const [chat,setChat]=useState(null);
  const [convos,setConvos]=useState({});
  const [ranking,setRanking]=useState([
    {name:"Ana Lima",pts:340,game:"Quiz Escola",avatar:"a1"},
    {name:"Bruno Souza",pts:280,game:"Tetris",avatar:"a8"},
    {name:"Diego Torres",pts:195,game:"Cobrinha",avatar:"a22"},
    {name:"Isabela Cruz",pts:150,game:"Memória",avatar:"a20"},
    {name:"João Pedro",pts:120,game:"Jogo da Velha",avatar:"a2"},
    {name:"Elena Costa",pts:90,game:"Forca",avatar:"a7"},
  ]);

  const T=THEMES.find(t=>t.id===tid)||THEMES[0];
  const F=FONTS.find(f=>f.id===fid)||FONTS[0];

  const handleScore=(gameId,pts)=>{
    if(!user||pts===0)return;
    const gameName=GAME_LIST.find(g=>g.id===gameId)?.name||gameId;
    setUser(u=>{
      const newPts=(u.pts||0)+pts;
      setRanking(r=>{
        const idx=r.findIndex(x=>x.name===u.name);
        const entry={name:u.name,pts:newPts,game:gameName,avatar:u.avatar||"a1"};
        if(idx>=0){const nr=[...r];nr[idx]=entry;return nr.sort((a,b)=>b.pts-a.pts);}
        return [...r,entry].sort((a,b)=>b.pts-a.pts);
      });
      return {...u,pts:newPts};
    });
  };

  const handleSend=(text,next,isMeet)=>{
    if(!chat)return;
    const id=chat.id;
    const myMsg={id:Date.now(),text,mine:true};
    const botMsg={id:Date.now()+1,text:rnd(MSG_TREE.flatMap(m=>[m,...(m.r||[]),...((m.r||[]).flatMap(r=>r.r||[]))]).filter(m=>!m.r||!m.r.length).map(m=>m.t))||"Interessante! Me procura no colégio!",mine:false};
    const alertMsg=isMeet?{id:Date.now()+2,alert:true}:null;
    setConvos(c=>{const prev=c[id]||{msgs:[],step:"root"};const newMsgs=[...prev.msgs,myMsg];if(alertMsg)newMsgs.push(alertMsg);setTimeout(()=>{setConvos(cv=>{const p2=cv[id]||{msgs:[],step:"root"};return{...cv,[id]:{msgs:[...p2.msgs,botMsg],step:next||"root"}};});},600);return{...c,[id]:{msgs:newMsgs,step:next||"root"}};});
  };

  useEffect(()=>{
    const style=document.createElement("style");style.textContent=mkCSS(T,F);style.id="taikoCSS";
    const old=document.getElementById("taikoCSS");if(old)old.remove();
    document.head.appendChild(style);return()=>style.remove();
  },[tid,fid,T,F]);

  if(splash)return <SplashScreen T={T} onDone={()=>setSplash(false)}/>;
  if(!onboarded)return <OnboardingScr T={T} onDone={()=>setOnboarded(true)}/>;
  if(!user)return <AuthScr T={T} onLogin={u=>setUser(u)}/>;

  if(chat){
    const convo=convos[chat.id]||{msgs:[],step:"root"};
    return(
      <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px",minHeight:"100vh",position:"relative",zIndex:1}}>
        <AnimBG T={T}/>
        <ChatScr T={T} user={user} contact={chat} msgs={convo.msgs} step={convo.step} onSend={handleSend} onBack={()=>setChat(null)}/>
      </div>
    );
  }

  return(
    <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px",minHeight:"100vh",position:"relative",zIndex:1}}>
      <AnimBG T={T}/>
      <div style={{position:"relative",zIndex:1}}>
        {tab==="home"&&<HomeScr T={T} user={user} onSelectContact={c=>{setChat(c);if(!convos[c.id])setConvos(cv=>({...cv,[c.id]:{msgs:[{id:Date.now(),text:`Oi, ${user.name}! Vi que temos interesses em comum. 😊`,mine:false}],step:"root"}}))} } onMessage={()=>{}}/>}
        {tab==="clubs"&&<ClubsScr T={T} user={user} onJoin={clubs=>setUser(u=>({...u,clubs}))}/>}
        {tab==="games"&&<GamesHub T={T} user={user} ranking={ranking} onScore={handleScore}/>}
        {tab==="profile"&&<ProfileScr T={T} user={user} themes={THEMES} fonts={FONTS} tid={tid} fid={fid} onLogout={()=>setUser(null)} onTheme={setTid} onFont={setFid} onAvatar={av=>setUser(u=>({...u,avatar:av}))}/>}
      </div>
      <BotNav T={T} tab={tab} setTab={setTab}/>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
